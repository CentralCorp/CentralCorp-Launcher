name: Launcher Build & Release

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.version }}
          name: "Geoventure Launcher v${{ env.version }}"
          body: |
            ## Geoventure Launcher v${{ env.version }}

            ### Téléchargements / Downloads

            | Plateforme | Fichier |
            |------------|---------|
            | 🪟 Windows 11 | `Geoventure Launcher-win-x64.exe` |
            | 🍎 macOS   | `Geoventure Launcher-mac-universal.dmg` |
            | 🐧 Linux   | `Geoventure Launcher-linux-x64.AppImage` |

            ### Minecraft 1.20.1
            Ce launcher est configuré pour Minecraft **1.20.1** avec Forge.
            This launcher is configured for Minecraft **1.20.1** with Forge.

            ---
            **Changelog**
          draft: false
          prerelease: ${{ contains(env.version, 'beta') || contains(env.version, 'alpha') }}
          generate_release_notes: true

  build-launcher:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always
        shell: bash
