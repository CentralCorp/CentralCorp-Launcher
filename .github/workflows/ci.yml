name: Launcher Build & Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Generate release notes
        id: release_notes
        run: |
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "## 🚀 Geoventure Launcher v${{ env.version }}" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "### 📦 Téléchargements" >> $GITHUB_ENV
          echo "| Plateforme | Fichier |" >> $GITHUB_ENV
          echo "|------------|---------|" >> $GITHUB_ENV
          echo "| 🪟 Windows | \`Conflictura Launcher-win-x64.exe\` |" >> $GITHUB_ENV
          echo "| 🍎 macOS   | \`Conflictura Launcher-mac-universal.dmg\` |" >> $GITHUB_ENV
          echo "| 🐧 Linux   | \`Conflictura Launcher-linux-x64.AppImage\` |" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "### 🎮 Minecraft 1.20.1" >> $GITHUB_ENV
          echo "Ce launcher est configuré pour Minecraft **1.20.1** avec Forge." >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "### 📋 Changelog" >> $GITHUB_ENV
          git log --oneline -10 --no-merges | sed 's/^/- /' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.version }}
          name: "🚀 Geoventure Launcher v${{ env.version }}"
          body: ${{ env.RELEASE_BODY }}
          draft: false
          prerelease: ${{ contains(env.version, 'beta') || contains(env.version, 'alpha') }}

  build-launcher:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always
        shell: bash
